# SPDX-License-Identifier: GPL-3.0-or-later
# Board-specific deps for the ESP32-2432S024 ("Cheap Yellow Display", 2.4").
dependencies:
  # ILI9341 SPI panel driver. Unlike the ST7789 (which ships inside the core
  # esp_lcd component), the ILI9341 constructor lives in this managed
  # component; boards/cyd_common/display.cpp includes esp_lcd_ili9341.h when
  # board_pins.h selects BOARD_LCD_CONTROLLER_ILI9341.
  espressif/esp_lcd_ili9341: "^2.0.0"
  # XPT2046 resistive-touch driver (separate SPI bus). The common
  # esp_lcd_touch abstraction is pulled in board-agnostically by main/.
  # atanisoft's is the de-facto community XPT2046 esp_lcd_touch driver and
  # provides ESP_LCD_TOUCH_IO_SPI_XPT2046_CONFIG + esp_lcd_touch_new_spi_xpt2046.
  atanisoft/esp_lcd_touch_xpt2046: "^1.0.6"
