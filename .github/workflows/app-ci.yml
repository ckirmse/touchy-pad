name: app CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "firmware/**"
      - "proto/**"
      - "rust/**"
      - "Justfile"
      - ".github/workflows/app-ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "firmware/**"
      - "proto/**"
      - "rust/**"
      - "Justfile"
      - ".github/workflows/app-ci.yml"

jobs:
  # ---------------------------------------------------------------------------
  # setup: read shared metadata (firmware version) and expose it as job outputs
  # so downstream jobs can consume a consistent value without duplicating the
  # VERSION-parsing logic.
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    outputs:
      fw-version: ${{ steps.read-version.outputs.fw-version }}
    steps:
      - uses: actions/checkout@v6

      - name: Read firmware version
        id: read-version
        run: echo "fw-version=$(sed -n '1p' VERSION)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # build-firmware: cross-build firmware for every supported board and upload
  # a single merged flashable `<board>.bin` per board. Shared with release.yml
  # via the reusable workflow so the matrix, IDF version, and merge command
  # only live in one place.
  # ---------------------------------------------------------------------------
  build-firmware:
    uses: ./.github/workflows/build-firmware.yml

  # ---------------------------------------------------------------------------
  # build-app: Python/Poetry dependency install → proto-Py generation → lint →
  # tests → wheel/sdist package → artifact upload.
  # Runs in parallel with install-esp-idf and build-firmware.
  #
  # Matrix runs on Linux, Windows, and macOS so we catch platform-specific
  # regressions in the host-side Python package. Only the Linux job uploads
  # the wheel/sdist artifact — the build output is platform-independent so
  # there's no need to ship three copies.
  # ---------------------------------------------------------------------------
  build-app:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto
        with:
          install-app-deps: 'true'

      - name: Ruff lint
        run: poetry run ruff check src tests

      - name: Pytest
        run: poetry run pytest --cov=touchy_pad --cov-report=term-missing

      - name: Simulator works
        working-directory: ${{ github.workspace }}
        run: just app-run --sim-headless screen demo

      - name: Build wheel + sdist
        if: matrix.os == 'ubuntu-latest'
        run: poetry build

      - name: Upload build artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: touchy-pad-dist
          path: app/dist/*

  # ---------------------------------------------------------------------------
  # test-rust: run the touchy-pad Rust library test suite. The plugin binaries
  # themselves are cross-built and packaged by the reusable build-opendeck
  # workflow below.
  # ---------------------------------------------------------------------------
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Run rust api libary tests
        run: cd rust && cargo test --workspace

  # ---------------------------------------------------------------------------
  # build-opendeck: cross-build the OpenDeck plugin for every target in the
  # manifest and package the multi-platform .sdPlugin zip. Shared with
  # release.yml via the reusable workflow.
  # ---------------------------------------------------------------------------
  build-opendeck:
    uses: ./.github/workflows/build-opendeck.yml

  # ---------------------------------------------------------------------------
  # finalize: download all artifacts produced by the parallel jobs and list
  # them so the run summary shows exactly what was shipped.
  # ---------------------------------------------------------------------------
  finalize:
    needs: [build-firmware, build-app, test-rust, build-opendeck]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List collected artifacts
        run: ls -lR artifacts
