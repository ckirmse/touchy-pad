name: Release

# Triggered when a GitHub release is published via the UI.
# Runs tests, builds firmware for all boards, publishes to PyPI,
# and uploads firmware binaries as release assets.
on:
  release:
    types: [published]

jobs:
  # ---------------------------------------------------------------------------
  # test-app: lint + test + build the Python package.
  # PyPI publish and release asset upload both depend on this passing.
  # ---------------------------------------------------------------------------
  test-app:
    name: Test & build Python package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared Python/Poetry/just/proto tooling
        uses: ./.github/actions/setup-python-poetry-just-proto
        with:
          install-app-deps: 'true'

      - name: Ruff lint
        run: poetry run ruff check src tests

      - name: Pytest
        run: poetry run pytest --cov=touchy_pad --cov-report=term-missing

      - name: Build wheel + sdist
        run: poetry build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: app/dist/

  # ---------------------------------------------------------------------------
  # build-firmware: cross-build firmware for every supported board and upload
  # a single merged flashable `<board>.bin` per board. Shared with app-ci.yml
  # via the reusable workflow so the matrix, IDF version, and merge command
  # only live in one place.
  # ---------------------------------------------------------------------------
  build-firmware:
    uses: ./.github/workflows/build-firmware.yml

  # ---------------------------------------------------------------------------
  # build-opendeck: cross-build the OpenDeck plugin for every target in the
  # manifest and package the multi-platform .sdPlugin zip. Shared with
  # app-ci.yml via the reusable workflow.
  # ---------------------------------------------------------------------------
  build-opendeck:
    uses: ./.github/workflows/build-opendeck.yml

  # ---------------------------------------------------------------------------
  # publish-pypi: OIDC trusted publish — only runs after tests pass.
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: [test-app]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/touchy-pad
    permissions:
      id-token: write
      attestations: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  # ---------------------------------------------------------------------------
  # upload-release-assets: attach all firmware .bin files to the GitHub release.
  # Runs after all board builds succeed.
  # ---------------------------------------------------------------------------
  upload-release-assets:
    name: Upload firmware to GitHub Release
    needs: [build-firmware, build-opendeck, test-app]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: firmware-*
          merge-multiple: true
          path: firmware-dist/

      - name: Download plugin artifact
        uses: actions/download-artifact@v7
        with:
          name: opendeck-touchypad-plugin
          path: firmware-dist/

      - name: List firmware files
        run: ls -lh firmware-dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firmware-dist/*.bin
            firmware-dist/*.zip
